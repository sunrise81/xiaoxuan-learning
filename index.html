<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小轩英语练习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;max-width:640px;margin:0 auto;padding:16px;background:#f0f2f5;color:#222}
.header{text-align:center;padding:16px 0 8px}
.header h1{font-size:1.6rem;color:#1a1a2e}
.header .day-info{font-size:.95rem;color:#666;margin-top:4px}
.header .topic{font-size:1rem;color:#4A90E2;font-weight:600;margin-top:6px}
.nav{display:flex;gap:6px;margin:12px 0 16px;flex-wrap:wrap}
.nav button{flex:1;min-width:calc(33% - 6px);padding:10px 4px;background:#4A90E2;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.nav button.active{background:#2E7D32}
.nav button:active{opacity:.85}
.card{background:#fff;padding:16px;border-radius:10px;margin:10px 0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card b{color:#333}
.q-stem{font-size:1.05rem;line-height:1.6;margin-bottom:4px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.opt{padding:10px 12px;border:2px solid #e0e0e0;border-radius:6px;cursor:pointer;font-size:.95rem;transition:all .15s}
.opt:hover{background:#e8f4ff;border-color:#90caf9}
.opt.selected{border-color:#4A90E2;background:#e3f0ff;font-weight:600}
.opt.correct{border-color:#2E7D32;background:#e8f5e9;color:#2E7D32}
.opt.wrong{border-color:#d32f2f;background:#ffebee;color:#d32f2f}
input[type=text],textarea{width:100%;padding:10px 12px;margin:6px 0;border:2px solid #4A90E2;border-radius:6px;font-size:1rem;box-sizing:border-box}
textarea{resize:vertical;min-height:60px}
.submit-btn{width:100%;padding:14px;background:#4A90E2;color:#fff;border:none;border-radius:8px;font-size:17px;font-weight:700;margin-top:16px;cursor:pointer;transition:background .2s}
.submit-btn:hover{background:#357ABD}
.submit-btn:active{background:#2E6DAA}
.result-banner{text-align:center;padding:20px;border-radius:10px;margin:12px 0;font-size:1.1rem;font-weight:700}
.result-banner.good{background:#e8f5e9;color:#2E7D32;border:2px solid #a5d6a7}
.result-banner.ok{background:#fff3e0;color:#e65100;border:2px solid #ffcc80}
.result-banner.bad{background:#ffebee;color:#c62828;border:2px solid #ef9a9a}
.explanation{font-size:.88rem;color:#666;margin-top:6px;padding:8px 10px;background:#f9f9f9;border-radius:6px;display:none}
.explanation.show{display:block}
.cloze-sentence{font-size:1.05rem;line-height:1.8}
.cloze-passage{font-size:1.05rem;line-height:2}
.cloze-hint{font-size:.85rem;color:#888;margin-top:2px}
.cloze-input{display:inline-block;width:100px;padding:6px 10px;margin:0 4px;border:none;border-bottom:2px solid #4A90E2;background:transparent;font-size:1rem;text-align:center;outline:none}
.cloze-input:focus{border-bottom-color:#2E7D32}
.cloze-input.correct{border-bottom-color:#2E7D32;color:#2E7D32;font-weight:700}
.cloze-input.wrong{border-bottom-color:#d32f2f;color:#d32f2f}
.trans-zh{font-size:1.1rem;color:#333;margin-bottom:6px}
.trans-hint{font-size:.85rem;color:#999;margin-bottom:4px}
.history-item{background:#fff;padding:14px;border-radius:10px;margin:10px 0;border-left:4px solid #4A90E2;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.history-item .h-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.history-item .h-type{font-weight:700;color:#4A90E2;text-transform:uppercase;font-size:.9rem}
.history-item .h-score{font-weight:700;font-size:1.1rem}
.history-item .h-score.perfect{color:#2E7D32}
.history-item .h-score.partial{color:#e65100}
.history-item .h-time{font-size:.82rem;color:#999}
.history-item .h-wrong{margin-top:8px;padding:10px;background:#ffebee;border-radius:6px;font-size:.9rem}
.history-item .h-wrong-item{margin:4px 0;color:#c62828}
.history-item .h-wrong-item .h-correct{color:#2E7D32;font-weight:600}
.clear-btn{display:block;margin:20px auto 0;padding:8px 20px;background:#eee;color:#999;border:none;border-radius:6px;font-size:.85rem;cursor:pointer}
.clear-btn:hover{background:#ddd;color:#666}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .icon{font-size:2.5rem;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
    <h1>小轩英语练习</h1>
    <div class="day-info" id="dayInfo"></div>
    <div class="topic" id="topicInfo"></div>
</div>

<div class="nav" style="flex-wrap:wrap">
    <button id="btn-quiz" onclick="show('quiz')">选择题</button>
    <button id="btn-cloze" onclick="show('cloze')">完形填空</button>
    <button id="btn-trans" onclick="show('trans')">翻译题</button>
    <button id="btn-history" onclick="show('history')">历史记录</button>
    <button id="btn-listening" onclick="show('listening')">听力</button>
    <button id="btn-writing" onclick="show('writing')">作文</button>
    <button id="btn-days" onclick="show('days')">历史题目</button>
</div>

<div id="content"></div>

<script>
// ==================== CONFIG ====================
var START_DATE = new Date('2026-03-23');

// ==================== DAY DATA ====================
var ALL_DAYS = {
    1: {
        title: 'There be 句型',
        topic: 'There is / There are 过去式',
        rule: 'There is + 单数名词/不可数名词\nThere are + 复数名词\n过去式: There was / There were\n时间状语: yesterday, last week, 2 years ago',
        questions: [
            {
                stem: 'There _____ a book on the table.',
                opts: ['is', 'are', 'was', 'were'],
                ans: 0,
                exp: 'a book是单数，用is'
            },
            {
                stem: 'There _____ some books on the desk.',
                opts: ['is', 'are', 'was', 'were'],
                ans: 1,
                exp: 'some books是复数，用are'
            },
            {
                stem: 'There _____ a cat under the bed yesterday.',
                opts: ['is', 'are', 'was', 'were'],
                ans: 2,
                exp: 'yesterday表示过去，用was'
            },
            {
                stem: 'There _____ many birds in the tree last week.',
                opts: ['is', 'are', 'was', 'were'],
                ans: 3,
                exp: 'birds是复数，last week表示过去，用were'
            },
            {
                stem: '_____ there any milk in the fridge?',
                opts: ['Is', 'Are', 'Was', 'Were'],
                ans: 1,
                exp: 'milk是不可数，但疑问句用are'
            },
            {
                stem: 'There _____ any students in the classroom.',
                opts: ['isn\'t', 'aren\'t', 'wasn\'t', 'weren\'t'],
                ans: 1,
                exp: 'students是复数，用aren\'t'
            }
        ],
        cloze: {
            passage: 'Yesterday, I _____ to the park. There _____ many people there. There _____ a big lake in the park. There _____ some boats on the water. It _____ a nice day!',
            blanks: [
                { answer: 'went', hint: '去...（过去式）' },
                { answer: 'were', hint: '有...（复数，过去式）' },
                { answer: 'was', hint: '有...（单数，过去式）' },
                { answer: 'were', hint: '有...（复数，过去式）' },
                { answer: 'was', hint: '是...（过去式）' }
            ]
        },
        translate: [
            {
                zh: '桌子上有一支笔。',
                zhHint: '单数名词，用There is',
                answer: 'there is a pen on the table',
                accept: ['there is a pen on the table']
            },
            {
                zh: '昨天教室里有一些学生。',
                zhHint: '复数+过去式，用There were',
                answer: 'there were some students in the classroom yesterday',
                accept: ['there were some students in the classroom yesterday']
            },
            {
                zh: '公园里有一只狗。',
                zhHint: '单数名词，用There is',
                answer: 'there is a dog in the park',
                accept: ['there is a dog in the park']
            }
        ]
    }
};

// ==================== AUTO DAY CALCULATION ====================
function getCurrentDay() {
    var urlDay = new URLSearchParams(window.location.search).get('day');
    if (urlDay) return parseInt(urlDay);
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var start = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
    var diff = Math.floor((today - start) / 86400000);
    return Math.max(1, diff + 1);
}

var DAY = getCurrentDay();
var DATA = ALL_DAYS[DAY] || null;

// ==================== HEADER ====================
document.getElementById('dayInfo').textContent = 'Day ' + DAY + '  \u2022  ' + new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
document.getElementById('topicInfo').textContent = DATA ? DATA.topic : 'No content for today';

// ==================== STATE ====================
var quizAnswers = {};
var quizSubmitted = false;

// ==================== SHOW TAB ====================
function show(tab) {
    document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('btn-' + tab).classList.add('active');
    var el = document.getElementById('content');
    if (tab === 'days') {
        renderDays(el);
        return;
    }
    if (tab === 'listening') {
        renderListening(el);
        return;
    }
    if (tab === 'writing') {
        renderWriting(el);
        return;
    }
    if (!DATA) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>No exercises available for Day ' + DAY + ' yet.<br>Check back tomorrow!</p></div>';
        return;
    }
    if (tab === 'quiz') renderQuiz(el);
    else if (tab === 'cloze') renderCloze(el);
    else if (tab === 'trans') renderTranslate(el);
    else if (tab === 'history') renderHistory(el);
}

// ==================== QUIZ TAB ====================
function renderQuiz(el) {
    var qs = DATA.questions;
    var html = '';
    html += '<div class="card" style="background:#e3f2fd;border-left:4px solid #4A90E2">';
    html += '<b>📖 语法规则</b><pre style="margin-top:8px;font-family:inherit;white-space:pre-wrap;font-size:.9rem;color:#444">' + DATA.rule + '</pre></div>';
    for (var i = 0; i < qs.length; i++) {
        var q = qs[i];
        html += '<div class="card"><div class="q-stem"><b>第' + (i+1) + '题.</b> ' + q.stem + '</div>';
        html += '<div class="opt-grid">';
        for (var j = 0; j < q.opts.length; j++) {
            var cls = 'opt';
            if (quizSubmitted) {
                if (j === q.ans) cls += ' correct';
                else if (quizAnswers[i] === j) cls += ' wrong';
            } else if (quizAnswers[i] === j) {
                cls += ' selected';
            }
            html += '<div class="' + cls + '" data-q="' + i + '" data-o="' + j + '" onclick="pickQuiz(' + i + ',' + j + ')">' + String.fromCharCode(65+j) + '. ' + q.opts[j] + '</div>';
        }
        html += '</div>';
        html += '<div class="explanation' + (quizSubmitted ? ' show' : '') + '" id="exp' + i + '">' + q.exp + '</div>';
        html += '</div>';
    }
    if (!quizSubmitted) {
        html += '<button class="submit-btn" onclick="submitQuiz()">提交答案</button>';
    }
    el.innerHTML = html;
}

function pickQuiz(qi, oi) {
    if (quizSubmitted) return;
    quizAnswers[qi] = oi;
    show('quiz');
}

function submitQuiz() {
    if (!DATA) return;
    var qs = DATA.questions;
    var unanswered = 0;
    for (var i = 0; i < qs.length; i++) {
        if (quizAnswers[i] === undefined) unanswered++;
    }
    if (unanswered > 0 && !confirm('还有 ' + unanswered + ' 道题未作答，确定要提交吗？')) return;

    quizSubmitted = true;
    var score = 0;
    var wrongList = [];
    for (var i = 0; i < qs.length; i++) {
        if (quizAnswers[i] === qs[i].ans) {
            score++;
        } else {
            wrongList.push({
                n: i + 1,
                ans: quizAnswers[i] !== undefined ? String.fromCharCode(65 + quizAnswers[i]) + '. ' + qs[i].opts[quizAnswers[i]] : 'no answer',
                correct: String.fromCharCode(65 + qs[i].ans) + '. ' + qs[i].opts[qs[i].ans],
                hint: qs[i].exp
            });
        }
    }
    var total = qs.length;
    saveRecord('quiz', score, total, wrongList);
    show('quiz');
    var pct = score / total;
    var cls = pct >= 0.8 ? 'good' : pct >= 0.5 ? 'ok' : 'bad';
    var banner = '<div class="result-banner ' + cls + '">选择题得分: ' + score + ' / ' + total + (pct === 1 ? ' 🎉 全对!' : '') + '</div>';
    document.getElementById('content').insertAdjacentHTML('afterbegin', banner);
}

// ==================== CLOZE TAB ====================
function renderCloze(el) {
    var cs = DATA.cloze;
    if (!cs || !cs.passage || !cs.blanks || cs.blanks.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>No cloze exercise for Day ' + DAY + ' yet.</p></div>';
        return;
    }
    var html = '';
    html += '<div class="card" style="background:#e3f2fd;border-left:4px solid #4A90E2">';
    html += '<b>📝 完形填空</b><p style="margin-top:6px;font-size:.9rem;color:#555">阅读短文，填写适当的单词</p></div>';
    html += '<div class="card">';
    html += '<div class="cloze-passage" style="font-size:1.05rem;line-height:2">';
    var parts = cs.passage.split('_____');
    for (var i = 0; i < parts.length; i++) {
        html += '<span>' + parts[i] + '</span>';
        if (i < cs.blanks.length) {
            html += '<input type="text" class="cloze-input" id="cloze' + i + '" placeholder="?" autocomplete="off" spellcheck="false">';
        }
    }
    html += '</div>';
    html += '<div class="cloze-hints" style="margin-top:20px;padding-top:16px;border-top:1px dashed #ddd">';
    html += '<b style="font-size:.9rem;color:#666">💡 提示:</b><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">';
    for (var i = 0; i < cs.blanks.length; i++) {
        html += '<div style="font-size:.85rem;color:#888;padding:6px 10px;background:#f5f5f5;border-radius:4px"><b>第' + (i+1) + '空:</b> ' + cs.blanks[i].hint + '</div>';
    }
    html += '</div></div></div>';
    html += '<button class="submit-btn" onclick="submitCloze()">提交答案</button>';
    el.innerHTML = html;
}

function submitCloze() {
    if (!DATA || !DATA.cloze || !DATA.cloze.blanks) return;
    var cs = DATA.cloze;
    var blanks = cs.blanks;
    var score = 0;
    var wrongList = [];
    for (var i = 0; i < blanks.length; i++) {
        var input = document.getElementById('cloze' + i);
        var userAns = input.value.trim().toLowerCase();
        var correct = blanks[i].answer.toLowerCase();
        if (userAns === correct) {
            score++;
            input.classList.add('correct');
        } else {
            input.classList.add('wrong');
            wrongList.push({
                n: i + 1,
                ans: input.value.trim() || 'no answer',
                correct: blanks[i].answer,
                hint: blanks[i].hint
            });
        }
    }
    var total = blanks.length;
    saveRecord('cloze', score, total, wrongList);
    var pct = score / total;
    var cls = pct >= 0.8 ? 'good' : pct >= 0.5 ? 'ok' : 'bad';
    var btns = document.querySelectorAll('.submit-btn');
    for (var b = 0; b < btns.length; b++) btns[b].style.display = 'none';
    var banner = document.createElement('div');
    banner.className = 'result-banner ' + cls;
    banner.textContent = '完形填空得分: ' + score + ' / ' + total + (pct === 1 ? ' 🎉 全对!' : '');
    document.getElementById('content').insertAdjacentElement('afterbegin', banner);
}

// ==================== TRANSLATE TAB ====================
function renderTranslate(el) {
    var ts = DATA.translate;
    if (!ts || ts.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🔤</div><p>No translation exercise for Day ' + DAY + ' yet.</p></div>';
        return;
    }
    var html = '';
    html += '<div class="card" style="background:#e3f2fd;border-left:4px solid #4A90E2">';
    html += '<b>🔤 中译英</b><p style="margin-top:6px;font-size:.9rem;color:#555">将中文翻译成英文，注意拼写和语法！</p></div>';
    for (var i = 0; i < ts.length; i++) {
        var t = ts[i];
        html += '<div class="card">';
        html += '<div class="trans-zh"><b>第' + (i+1) + '题</b> ' + t.zh + '</div>';
        html += '<div class="trans-hint">💡 ' + t.zhHint + '</div>';
        html += '<textarea id="trans' + i + '" rows="2" placeholder="在这里写英文翻译..."></textarea>';
        html += '</div>';
    }
    html += '<button class="submit-btn" onclick="submitTrans()">提交答案</button>';
    el.innerHTML = html;
}

function submitTrans() {
    if (!DATA) return;
    var ts = DATA.translate;
    var score = 0;
    var wrongList = [];
    for (var i = 0; i < ts.length; i++) {
        var input = document.getElementById('trans' + i);
        var userAns = input.value.trim().toLowerCase().replace(/[.,!?;:'"]/g, '').replace(/\s+/g, ' ');
        var matched = false;
        var acceptList = ts[i].accept || [ts[i].answer];
        for (var a = 0; a < acceptList.length; a++) {
            var expected = acceptList[a].toLowerCase().replace(/[.,!?;:'"]/g, '').replace(/\s+/g, ' ');
            if (userAns === expected) { matched = true; break; }
        }
        if (matched) {
            score++;
            input.style.borderColor = '#2E7D32';
            input.style.color = '#2E7D32';
        } else {
            input.style.borderColor = '#d32f2f';
            input.style.color = '#d32f2f';
            var corrDiv = document.createElement('div');
            corrDiv.style.cssText = 'font-size:.88rem;color:#2E7D32;margin-top:4px;padding:6px 10px;background:#e8f5e9;border-radius:6px';
            corrDiv.textContent = '✓ Answer: ' + ts[i].answer;
            input.parentElement.appendChild(corrDiv);
            wrongList.push({
                n: i + 1,
                ans: input.value.trim() || 'no answer',
                correct: ts[i].answer,
                hint: ts[i].zhHint
            });
        }
    }
    var total = ts.length;
    saveRecord('translate', score, total, wrongList);
    var btns = document.querySelectorAll('.submit-btn');
    for (var b = 0; b < btns.length; b++) btns[b].style.display = 'none';
    var pct = score / total;
    var cls = pct >= 0.8 ? 'good' : pct >= 0.5 ? 'ok' : 'bad';
    var banner = document.createElement('div');
    banner.className = 'result-banner ' + cls;
    banner.textContent = '翻译题得分: ' + score + ' / ' + total + (pct === 1 ? ' 🎉 全对!' : '');
    document.getElementById('content').insertAdjacentElement('afterbegin', banner);
}

// ==================== DAYS TAB ====================
function renderDays(el) {
    var html = '<div class="card" style="background:#e3f2fd;border-left:4px solid #4A90E2">';
    html += '<b>📅 历史题目</b><p style="margin-top:6px;font-size:.9rem;color:#555">点击日期查看历史练习</p></div>';
    html += '<div class="card"><div class="opt-grid">';
    for (var i = 1; i <= 30; i++) {
        var isCurrent = i === DAY;
        html += '<a href="?day=' + i + '" class="opt' + (isCurrent ? ' selected' : '') + '" style="text-decoration:none;display:block;text-align:center;padding:12px;">Day ' + i + (isCurrent ? ' ✓' : '') + '</a>';
    }
    html += '</div></div>';
    html += '<a href="?" class="submit-btn" style="display:block;text-align:center;text-decoration:none;">← 返回今天</a>';
    el.innerHTML = html;
}

// ==================== LISTENING TAB ====================
function renderListening(el) {
    var html = '<div class="empty-state"><div class="icon">🎧</div><p>听力练习即将推出！<br>敬请期待...</p></div>';
    html += '<div class="card" style="background:#fff3e0;border-left:4px solid #ff9800;margin-top:16px">';
    html += '<b>📝 功能说明:</b>';
    html += '<ul style="margin-top:8px;padding-left:20px;color:#555;font-size:.95rem">';
    html += '<li>听音频片段</li>';
    html += '<li>回答听力问题</li>';
    html += '<li>提高听力技能</li>';
    html += '</ul></div>';
    el.innerHTML = html;
}

// ==================== WRITING TAB ====================
function renderWriting(el) {
    var html = '<div class="empty-state"><div class="icon">✍️</div><p>作文练习即将推出！<br>敬请期待...</p></div>';
    html += '<div class="card" style="background:#fff3e0;border-left:4px solid #ff9800;margin-top:16px">';
    html += '<b>📝 功能说明:</b>';
    html += '<ul style="margin-top:8px;padding-left:20px;color:#555;font-size:.95rem">';
    html += '<li>根据给定题目写作文</li>';
    html += '<li>获取AI批改反馈</li>';
    html += '<li>提升写作能力</li>';
    html += '</ul></div>';
    el.innerHTML = html;
}

// ==================== HISTORY TAB ====================
function renderHistory(el) {
    var history = loadHistory();
    if (history.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无练习记录。<br>完成练习后即可在此查看历史记录！</p></div>';
        return;
    }
    var html = '';
    for (var i = 0; i < history.length; i++) {
        var h = history[i];
        var pct = h.total > 0 ? h.score / h.total : 0;
        var scoreCls = pct >= 0.8 ? 'perfect' : 'partial';
        var isPerfect = pct === 1;
        
        html += '<div class="history-item">';
        var typeName = h.type === 'quiz' ? '选择题' : h.type === 'cloze' ? '完形填空' : '翻译题';
        html += '<div class="h-header"><span class="h-type">' + typeName + ' - Day ' + h.day + '</span><span class="h-score ' + scoreCls + '">' + h.score + '/' + h.total + (isPerfect ? ' 🎉' : '') + '</span></div>';
        html += '<div class="h-time">' + h.date + ' ' + h.time + ' <button onclick="deleteRecord(' + i + ')" style="margin-left:10px;padding:2px 8px;background:#ffebee;color:#c62828;border:1px solid #ef9a9a;border-radius:4px;font-size:.75rem;cursor:pointer">删除</button></div>';
        
        if (h.wrongList && h.wrongList.length > 0) {
            html += '<div class="h-wrong">';
            html += '<b style="color:#c62828;font-size:.9rem">❌ 错题:</b>';
            for (var j = 0; j < h.wrongList.length; j++) {
                var w = h.wrongList[j];
                html += '<div class="h-wrong-item" style="margin-top:8px">';
                html += '<div><b>第' + w.n + '题:</b> ' + escHtml(w.ans) + ' → <span class="h-correct">' + escHtml(w.correct) + '</span></div>';
                if (w.hint) html += '<div style="color:#888;font-size:.82rem;margin-top:2px">💡 ' + escHtml(w.hint) + '</div>';
                html += '</div>';
            }
            html += '</div>';
        } else {
            html += '<div style="color:#2E7D32;font-size:.95rem;margin-top:8px;padding:8px;background:#e8f5e9;border-radius:6px">✅ 太棒了！全部正确！</div>';
        }
        html += '</div>';
    }
    html += '<button class="clear-btn" onclick="if(confirm(\'确定要清空所有历史记录吗？\')){localStorage.removeItem(\'xiaoxuanHistory\');show(\'history\')}">清空所有历史记录</button>';
    el.innerHTML = html;
}

function deleteRecord(index) {
    if (!confirm('确定要删除这条记录吗？')) return;
    var history = loadHistory();
    history.splice(index, 1);
    localStorage.setItem('xiaoxuanHistory', JSON.stringify(history));
    show('history');
}

// ==================== HISTORY STORAGE ====================
function loadHistory() {
    try {
        var data = localStorage.getItem('xiaoxuanHistory');
        return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
}

function saveRecord(type, score, total, wrongList) {
    var now = new Date();
    var record = {
        type: type,
        day: DAY,
        score: score,
        total: total,
        date: now.getFullYear() + '-' + (now.getMonth()+1) + '-' + now.getDate(),
        time: pad(now.getHours()) + ':' + pad(now.getMinutes()),
        wrongList: wrongList
    };
    var history = loadHistory();
    history.unshift(record);
    if (history.length > 50) history = history.slice(0, 50);
    localStorage.setItem('xiaoxuanHistory', JSON.stringify(history));
}

// ==================== UTILS ====================
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ==================== INIT ====================
show('quiz');
</script>

</html>
